<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 360px;
        text-align: center;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .login-container img {
        width: 120px;
        margin-bottom: 10px;
    }

    h2 {
        color: #141e30;
        font-size: 18px;
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 95%;
        padding: 10px;
        background: #243b55;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #141e30;
    }

    .footer {
        margin-top: 10px;
        font-size: 12px;
        color: gray;
    }
</style>

</head>

<body>

<div class="login-container">

    <!-- College Logo -->
    <img src="logo.png" alt="College Logo">

    <!-- College Name -->
    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

    <!-- Login Form -->
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="alert('Login Successful!')">
        Login
    </button>

    <div class="footer">
        © 2026 Adhiparasakthi Engineering College
    </div>

</div>

</body>
</html>
